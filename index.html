        /* --- 页面4 (已标记) --- */
        #page4 { justify-content: flex-start; align-items: center; }

        #page5 { justify-content: flex-start; align-items: center; }

        .gallery-word { display: inline-flex; justify-content: center; align-items: center; padding: 1.87vw 3.2vw; font-size: 4.27vw; border-radius: 5.33vw; background-color: #e74c3c; color: white; user-select: text; cursor: pointer; white-space: nowrap; box-sizing: border-box; transition: 0.3s; }
        .gallery-word.selected { background-color: #c0392b; transform: scale(1.05); box-shadow: 0 0.53vw 1.6vw rgba(0, 0, 0, 0.2); }
        .page5-action-container { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 80%; max-width: 80vw; z-index: 999; display: none; gap: 10px; padding: 20px 0; padding-bottom: calc(20px + var(--safe-area-bottom)); }

    </style>
</head>
<body>

    <div id="toast" class="toast" style="display: none;"></div>

    <script>
    document.addEventListener('DOMContentLoaded', () => {

        const wx = {
            getStorageSync: (key) => { const item = localStorage.getItem(key); return item ? JSON.parse(item) : null; },
            setStorageSync: (key, data) => { localStorage.setItem(key, JSON.stringify(data)); },
            removeStorageSync: (key) => { localStorage.removeItem(key); },
            clearStorageSync: () => { localStorage.clear(); },
            setClipboardData: async ({ data, success, fail }) => {
                if (navigator.clipboard) {
                    try { await navigator.clipboard.writeText(data); if (success) success(); } catch (err) { if (fail) fail(); }
                } else {
                    const textArea = document.createElement("textarea");
                    textArea.value = data; document.body.appendChild(textArea); textArea.focus(); textArea.select();
                    try { document.execCommand('copy'); if (success) success(); } catch (err) { if (fail) fail(); }
                    document.body.removeChild(textArea);
                }
            },
            showToast: (options) => {
                const toastEl = document.getElementById('toast');
                toastEl.textContent = options.title; toastEl.className = 'toast';
                if (options.icon === 'success') toastEl.classList.add('success');
                else if (options.icon === 'error' || options.icon === 'none') toastEl.classList.add('error');
                else if (options.icon === 'info') toastEl.classList.add('info');
                toastEl.style.display = 'block';
                setTimeout(() => { toastEl.style.display = 'none'; }, options.duration || 2000);
            },
            showModal: (options) => {
                const result = confirm(`${options.title}\n${options.content}`);
                if (options.success) {
                    options.success({ confirm: result, cancel: !result });
                }
            }
        };

        const pages = {
            page1: document.getElementById('page1'),
            page2: document.getElementById('page2'),
            page3: document.getElementById('page3'),
            page4: document.getElementById('page4'),
            page5: document.getElementById('page5'),
        };
        const navButtons = {
            btn1: document.getElementById('nav-btn-1'),
            btn2: document.getElementById('nav-btn-2'),
            btn3: document.getElementById('nav-btn-3'),
            btn4: document.getElementById('nav-btn-4'),
            btn5: document.getElementById('nav-btn-5'),
        };
        
        const NEWLINE_REPLACEMENT = '##NEWLINE##';
        const ERROR_SCHEDULE = [1, 2, 4, 7, 15, 30, 45, 60, 75, 90];

        function getDaysDiff(dateStr1, dateStr2) {
            const d1 = new Date(dateStr1);
            const d2 = new Date(dateStr2);
            d1.setHours(0,0,0,0);
            d2.setHours(0,0,0,0);
            return Math.floor((d2 - d1) / (1000 * 60 * 60 * 24));
        }

        let touchStartX = 0;
        let currentPageIndex = 1;
        const swipeThreshold = 50; 

        function handleTouchStart(event) {
            const targetNode = event.target.nodeName.toUpperCase();
            if (document.getElementById('confirmDialog').style.display !== 'none' ||
                ['INPUT', 'TEXTAREA', 'BUTTON', 'SELECT'].includes(targetNode) ||
                event.target.closest('.filter-dot')) { 
                touchStartX = 0;
                return;
            }
            touchStartX = event.changedTouches[0].screenX;
        }

        function handleTouchEnd(event) {
            if (touchStartX === 0) return;
            const touchEndX = event.changedTouches[0].screenX;
            const diffX = touchEndX - touchStartX;
            if (diffX < -swipeThreshold && currentPageIndex < 5) { navigateTo(`page${currentPageIndex + 1}`); }
            else if (diffX > swipeThreshold && currentPageIndex > 1) { navigateTo(`page${currentPageIndex - 1}`); }
            touchStartX = 0;
        }

        document.body.addEventListener('touchstart', handleTouchStart, false);
        document.body.addEventListener('touchend', handleTouchEnd, false);

        function navigateTo(pageId) {
            Object.values(pages).forEach(p => p.classList.remove('active'));
            Object.values(navButtons).forEach(b => b.classList.remove('active'));
            pages[pageId].classList.add('active');
            navButtons['btn' + pageId.slice(-1)].classList.add('active');
            currentPageIndex = parseInt(pageId.slice(-1));
            const handler = app[pageId];
            if (handler && typeof handler.onShow === 'function') {
                handler.onShow();
            }
        }
        navButtons.btn1.addEventListener('click', () => navigateTo('page1'));
        navButtons.btn2.addEventListener('click', () => navigateTo('page2'));
        navButtons.btn3.addEventListener('click', () => navigateTo('page3'));
        navButtons.btn4.addEventListener('click', () => navigateTo('page4'));

                        if (this.data.currentMode === '1') { this.data.x = this.data.n - this.data.todayword1.length; if (this.data.todayword1.length === 0 && this.data.n > 0) { this.data.m++; this.data.todayword1 = [...this.data.todayword]; this.data.x = 0; } else if (this.data.todayword1.length === 0 && this.data.n === 0) { this.data.x = 0; } }
                        if (this.data.currentMode === '-1') { this.data.y = this.data.z - this.data.todayNewWord1.length; if (this.data.todayNewWord1.length === 0 && this.data.z > 0) { this.data.p++; this.data.todayNewWord1 = [...this.data.todayNewWord]; this.data.y = 0; } else if (this.data.todayNewWord1.length === 0 && this.data.z === 0) { this.data.y = 0; } }

            // =================================== PAGE 2: 管理 ===================================
            page2: {
                elements: { inputContent: document.getElementById('inputContent'), saveStatus: document.getElementById('saveStatus'), versionInfo: document.getElementById('versionInfo') },

                    const inputEl = document.getElementById('searchInput');
                    const resultEl = document.getElementById('searchResult');
                    const keyword = inputEl.value.trim();
                    if (!keyword) { resultEl.style.display = 'none'; return; }

                    const searchVal = keyword.replace(/\n/g, NEWLINE_REPLACEMENT);
                    let myCards = wx.getStorageSync('myCards') || [];
                    const foundIndex = myCards.findIndex(c => c.word === searchVal || c.word.toLowerCase() === searchVal.toLowerCase());

                    if (foundIndex === -1) {
                        resultEl.innerHTML = '<div style="text-align:center; color:#999; padding:10px 0;">无匹配内容</div>';

                    } else {
                        const card = myCards[foundIndex];
                        const joinDateStr = card.createDate.replace(/-/g, '');
                        const meaningHtml = card.meaning ? `<div class="search-result-info" style="color:#666; font-size: 13px;">释义：${card.meaning}</div>` : '';

                        let curveHtml = '';

                        let spellingStats = wx.getStorageSync('spellingStats') || {};
                        let stats = spellingStats[card.word] || { correct: 0, wrong: 0 };
                        let spellHistoryHtml = `<div class="search-result-info">拼写历史：<span style="color:#4caf50;">✓${stats.correct}</span> <span style="color:#f44336;">✗${stats.wrong}</span></div>`;
                        
                        let errorBook = wx.getStorageSync('errorBook') || [];
                        let errorItem = errorBook.find(e => e.word === card.word);
                        let spellPlanHtml = '';
                        if (errorItem) {

                                else planCurve += `<span class="pending">${day}</span>`;
                            });
                            spellPlanHtml = `<div class="search-result-info review-curve">拼写计划：${planCurve}</div>`;
                        }

                        resultEl.innerHTML = `
                            <div class="search-result-word">${card.word.replace(new RegExp(NEWLINE_REPLACEMENT, 'g'), '\n')}</div>
                            ${meaningHtml}
                            <div class="search-result-info">加入时间：${joinDateStr}</div>
                            <div class="search-result-info review-curve">复习计划：${curveHtml}</div>

                    let myCards = wx.getStorageSync('myCards') || [];
                    const initialLen = myCards.length;
                    myCards = myCards.filter(c => c.word !== wordToDelete);

                    if (myCards.length < initialLen) {
                        wx.setStorageSync('myCards', myCards);
                        app.page1.data.allword = [...myCards];
                        app.page1.data.todayword = myCards.filter(card => app.page1.TODAY_PASTDAYS_FILTER.includes(card.pastday));
                        app.page1.data.todayNewWord = myCards.filter(card => card.pastday === 0);
                        wx.setStorageSync('allword', app.page1.data.allword); wx.setStorageSync('todayword', app.page1.data.todayword); wx.setStorageSync('todayNewWord', app.page1.data.todayNewWord);

                        app.page1.data.allword1 = app.page1.data.allword1.filter(c => c.word !== wordToDelete);
                        app.page1.data.todayword1 = app.page1.data.todayword1.filter(c => c.word !== wordToDelete);
                        app.page1.data.todayNewWord1 = app.page1.data.todayNewWord1.filter(c => c.word !== wordToDelete);

                        app.page1.data.j = app.page1.data.allword.length; app.page1.data.n = app.page1.data.todayword.length; app.page1.data.z = app.page1.data.todayNewWord.length;

                        if(app.page1.data.currentMode === '0') app.page1.data.i = app.page1.data.j - app.page1.data.allword1.length;
                        else if(app.page1.data.currentMode === '1') app.page1.data.x = app.page1.data.n - app.page1.data.todayword1.length;
                        else if(app.page1.data.currentMode === '-1') app.page1.data.y = app.page1.data.z - app.page1.data.todayNewWord1.length;

                        app.page1.saveProgress();

                        let wordCounts = wx.getStorageSync('wordCounts') || {};
                        if (wordCounts[wordToDelete]) { delete wordCounts[wordToDelete]; wx.setStorageSync('wordCounts', wordCounts); }
                        
                        let errorBook = wx.getStorageSync('errorBook') || [];
                        errorBook = errorBook.filter(e => e.word !== wordToDelete);
                        wx.setStorageSync('errorBook', errorBook);
                        
                        if (app.page3 && typeof app.page3.removeWordFromState === 'function') {
                            app.page3.removeWordFromState(wordToDelete);
                        }

                        wx.showToast({ title: '删除成功', icon: 'success' }); app.page1.updateStatistics();
                        if (app.page1.data.displayContent === wordToDelete.replace(new RegExp(NEWLINE_REPLACEMENT, 'g'), '\n')) app.page1.getRandomContent(false);

                saveCard() {
                    let content = this.elements.inputContent.value;
                    content = content.replace(/\n\s*\n/g, '\n').trim();
                    const rawLines = content.split('\n').map(s => s.trim()).filter(s => s !== '');
                    if (rawLines.length === 0) { wx.showToast({ title: '内容不能为空', icon: 'none' }); this.elements.inputContent.value = ''; return; }

                    const todayStr = new Date().toLocaleDateString('en-CA'); 
                    let existingCards = wx.getStorageSync('myCards') || [];
                    const existingWordSet = new Set(existingCards.map(card => card.word));
                    
                    let uniqueNewCards = []; let forceUpdatedWordsList = []; let meaningUpdatedWordsList = []; 
                    let duplicateCount = 0; let updateCount = 0; 
                    let batchInputMap = new Map();

                    rawLines.forEach(line => {
                        let wordPart = line; let meaningPart = "";
                        const colonIndex = line.search(/[:：]/);
                        if (colonIndex !== -1) { wordPart = line.substring(0, colonIndex).trim(); meaningPart = line.substring(colonIndex + 1).trim(); }

                        let forceUpdate = false; let pastday = 0; let createDate = todayStr;
                        if (wordPart.endsWith('！') || wordPart.endsWith('!')) { forceUpdate = true; wordPart = wordPart.slice(0, -1).trim(); }
                        let wordToSave = wordPart.replace(/\n/g, NEWLINE_REPLACEMENT);

                        if (batchInputMap.has(wordToSave)) { duplicateCount++; return; }
                        batchInputMap.set(wordToSave, true);

                        if (forceUpdate) {
                            const initLen = existingCards.length;
                            let oldMeaning = "";
                            existingCards = existingCards.filter(card => {
                                if (card.word === wordToSave) { oldMeaning = card.meaning || ""; return false; }
                                return true;
                            });
                            if (existingCards.length < initLen) { updateCount++; forceUpdatedWordsList.push(wordToSave); }
                            
                            let finalMeaning = meaningPart.trim() !== '' ? meaningPart : oldMeaning;
                            uniqueNewCards.push({ word: wordToSave, meaning: finalMeaning, pastday: pastday, createDate: createDate });
                        } else {
                            let existingCard = existingCards.find(c => c.word === wordToSave);
                            if (existingCard) {
                                if ((!existingCard.meaning || existingCard.meaning.trim() === '') && meaningPart.trim() !== '') {
                                    existingCard.meaning = meaningPart; updateCount++; meaningUpdatedWordsList.push({ word: wordToSave, meaning: meaningPart });
                                } else { duplicateCount++; }
                            } else {
                                uniqueNewCards.push({ word: wordToSave, meaning: meaningPart, pastday: pastday, createDate: createDate });
                                existingWordSet.add(wordToSave); 
                            }
                        }
                    });

                    if (uniqueNewCards.length > 0 || updateCount > 0) {
                        let updatedCards = existingCards.concat(uniqueNewCards); wx.setStorageSync('myCards', updatedCards);
                        app.page1.data.allword = [...updatedCards];
                        app.page1.data.todayword = updatedCards.filter(card => app.page1.TODAY_PASTDAYS_FILTER.includes(card.pastday));
                        app.page1.data.todayNewWord = updatedCards.filter(card => card.pastday === 0);
                        wx.setStorageSync('allword', app.page1.data.allword); wx.setStorageSync('todayword', app.page1.data.todayword); wx.setStorageSync('todayNewWord', app.page1.data.todayNewWord);

                        if (forceUpdatedWordsList.length > 0) {
                            forceUpdatedWordsList.forEach(word => {
                                app.page1.data.allword1 = app.page1.data.allword1.filter(c => c.word !== word);
                                app.page1.data.todayword1 = app.page1.data.todayword1.filter(c => c.word !== word);
                                app.page1.data.todayNewWord1 = app.page1.data.todayNewWord1.filter(c => c.word !== word);
                            });
                        }
                        if (meaningUpdatedWordsList.length > 0) {
                            meaningUpdatedWordsList.forEach(updateItem => {
                                let aw1 = app.page1.data.allword1.find(c => c.word === updateItem.word); if (aw1) aw1.meaning = updateItem.meaning;
                                let tw1 = app.page1.data.todayword1.find(c => c.word === updateItem.word); if (tw1) tw1.meaning = updateItem.meaning;
                                let tnw1 = app.page1.data.todayNewWord1.find(c => c.word === updateItem.word); if (tnw1) tnw1.meaning = updateItem.meaning;
                            });
                        }
                        uniqueNewCards.forEach(card => {
                            if (!app.page1.data.allword1.some(c => c.word === card.word)) app.page1.data.allword1.push(card);
                            if (app.page1.TODAY_PASTDAYS_FILTER.includes(card.pastday) && !app.page1.data.todayword1.some(c => c.word === card.word)) app.page1.data.todayword1.push(card);
                            if (card.pastday === 0 && !app.page1.data.todayNewWord1.some(c => c.word === card.word)) app.page1.data.todayNewWord1.push(card);
                        });

                        app.page1.data.j = app.page1.data.allword.length; app.page1.data.n = app.page1.data.todayword.length; app.page1.data.z = app.page1.data.todayNewWord.length;
                        if (app.page1.data.k === 0 && app.page1.data.allword1.length > 0) app.page1.data.k = 1;
                        if (app.page1.data.m === 0 && app.page1.data.todayword1.length > 0) app.page1.data.m = 1;
                        if (app.page1.data.p === 0 && app.page1.data.todayNewWord1.length > 0) app.page1.data.p = 1;
                        if (app.page1.data.currentMode === '0') app.page1.data.i = app.page1.data.j - app.page1.data.allword1.length;
                        else if (app.page1.data.currentMode === '1') app.page1.data.x = app.page1.data.n - app.page1.data.todayword1.length;
                        else if (app.page1.data.currentMode === '-1') app.page1.data.y = app.page1.data.z - app.page1.data.todayNewWord1.length;
                        
                        app.page1.saveProgress(); 
                        let statusText = [];
                        if (uniqueNewCards.length > 0) statusText.push(`新增 ${uniqueNewCards.length} 条`);
                        if (updateCount > 0) statusText.push(`更新 ${updateCount} 条`);
                        this.elements.saveStatus.textContent = statusText.join('，') + '!';
                        
                        if (duplicateCount > 0) wx.showToast({ title: statusText.join('，') + `，跳过 ${duplicateCount} 条重复`, icon: 'info', duration: 3000 });
                        else wx.showToast({ title: '保存成功', icon: 'success' });
                        app.page1.updateStatistics(); 
                    } else if (duplicateCount > 0) { wx.showToast({ title: `全部内容重复，未保存`, icon: 'error', duration: 2500 });
                    } else { wx.showToast({ title: '没有内容可保存', icon: 'none' }); }

                    this.elements.inputContent.value = ''; setTimeout(() => { this.elements.saveStatus.textContent = ''; }, 2000);
                },
                copyAllContents() {
                    let cardsToCopy = []; const currentMode = app.page1.data.currentMode;
                    if (currentMode === 'A') cardsToCopy = wx.getStorageSync('myCards') || [];
                    else if (currentMode === '0') cardsToCopy = app.page1.data.allword; 
                    else if (currentMode === '1') cardsToCopy = app.page1.data.todayword; 
                    else if (currentMode === '-1') cardsToCopy = app.page1.data.todayNewWord; 

                    const cardWords = cardsToCopy.map(card => card.word.replace(new RegExp(NEWLINE_REPLACEMENT, 'g'), '\n'));
                    if (cardWords.length === 0) { wx.showToast({ title: '没有内容可复制', icon: 'none' }); return; }
                    wx.setClipboardData({ data: cardWords.join('\n'), success: () => wx.showToast({ title: '复制成功', icon: 'success', duration: 1000 }) });
                },
                exportData() {
                    const myCards = wx.getStorageSync('myCards') || [];
                    if (myCards.length === 0) { wx.showToast({ title: '没有数据可导出', icon: 'error' }); return; }
                    const blob = new Blob([JSON.stringify(myCards, null, 2)], { type: 'text/plain;charset=utf-8' });
                    const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url;
                    a.download = `mycards_backup_${new Date().toLocaleDateString('en-CA').replace(/-/g, '')}.txt`;
                    document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
                    wx.showToast({ title: '导出成功', icon: 'success' });
                },
                importData(e) {
                    const file = e.target.files[0]; if (!file) return;
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        try {
                            const importedData = JSON.parse(event.target.result);
                            if (!Array.isArray(importedData)) throw new Error('Data is not an array');
                            const isValid = importedData.every(item => item.hasOwnProperty('word') && item.hasOwnProperty('pastday') && item.hasOwnProperty('createDate'));
                            if (!isValid) throw new Error('Data format invalid');

                            wx.setStorageSync('myCards', importedData);
                            app.page1.data.allword = [...importedData];
                            app.page1.data.todayword = importedData.filter(card => app.page1.TODAY_PASTDAYS_FILTER.includes(card.pastday));
                            app.page1.data.todayNewWord = importedData.filter(card => card.pastday === 0);
                            wx.setStorageSync('allword', app.page1.data.allword); wx.setStorageSync('todayword', app.page1.data.todayword); wx.setStorageSync('todayNewWord', app.page1.data.todayNewWord);
                            
                            app.page1.data.allword1 = []; app.page1.data.todayword1 = []; app.page1.data.todayNewWord1 = [];
                            app.page1.data.i = 0; app.page1.data.j = app.page1.data.allword.length; app.page1.data.k = 0;
                            app.page1.data.x = 0; app.page1.data.n = app.page1.data.todayword.length; app.page1.data.m = 0;
                            app.page1.data.y = 0; app.page1.data.z = app.page1.data.todayNewWord.length; app.page1.data.p = 0;
                            
                            app.page1.saveProgress(); app.page1.updateStatistics(); this.onShow();
                            wx.showToast({ title: '导入成功', icon: 'success' });
                        } catch (err) { wx.showToast({ title: '文件格式错误或损坏', icon: 'error' }); } 
                        finally { e.target.value = ''; }
                    };
                    reader.readAsText(file);
                }
            },

            // =================================== PAGE 3: 回顾(拼写) ===================================
            page3: {
                data: {
                    activeMode: null,  
                    subMode: null,     
                    state: null        
                },
                elements: {
                    selectBtn: document.getElementById('spellSelectBtn'),
                    reviewBtn: document.getElementById('spellReviewBtn'),
                    errorBtn: document.getElementById('spellErrorBtn'),
                    meaningDisplay: document.getElementById('spellMeaningDisplay'),
                    hintDisplay: document.getElementById('spellHintDisplay'),

                    progressDisplay: document.getElementById('spellProgressDisplay'),
                    progressNM: document.getElementById('spellProgressNM'),
                    progressJ: document.getElementById('spellProgressJ'),
                    restartBtn: document.getElementById('spellRestartBtn'),
                    copyEmptyBtn: document.getElementById('copyEmptyMeaningBtnPage3'),
                    travelBtn: document.getElementById('spellTravelBtnPage3')
                },

                    app.globalInit(); 
                    this.updateSelectOptions(); 
                    this.loadSpellingState();
                },

                    this.elements.selectBtn.addEventListener('change', (e) => { 
                        this.switchMode('select', e.target.value); 
                    });
                    this.elements.reviewBtn.addEventListener('click', () => this.switchMode('review', null));
                    this.elements.errorBtn.addEventListener('click', () => this.switchMode('error', null));
                    this.elements.restartBtn.addEventListener('click', () => this.restartCurrentMode());
                    this.elements.copyEmptyBtn.addEventListener('click', () => this.copyEmptyMeaningWords());
                    this.elements.travelBtn.addEventListener('click', () => this.travelWord());
                    this.elements.inputField.addEventListener('keydown', (e) => {
                        if (e.key === 'Enter') this.checkInput();
                    });
                },
                updateSelectOptions() {
                    const allCards = wx.getStorageSync('myCards') || [];
                    const todayword = allCards.filter(card => app.page1.TODAY_PASTDAYS_FILTER.includes(card.pastday));
                    const todayNewWord = allCards.filter(card => card.pastday === 0);
                    const errorBook = wx.getStorageSync('errorBook') || [];

                    this.elements.selectBtn.innerHTML = `
                        <option value="" disabled ${!this.data.subMode ? 'selected' : ''}>选择</option>
                        <option value="A" ${this.data.subMode === 'A' ? 'selected' : ''}>A - ${allCards.length}</option>
                        <option value="0" ${this.data.subMode === '0' ? 'selected' : ''}>0 - ${allCards.length}</option>
                        <option value="1" ${this.data.subMode === '1' ? 'selected' : ''}>1 - ${todayword.length}</option>
                        <option value="-1" ${this.data.subMode === '-1' ? 'selected' : ''}>-1 - ${todayNewWord.length}</option>
                        <option value="E" ${this.data.subMode === 'E' ? 'selected' : ''}>E - ${errorBook.length}</option>
                    `;
                },
                getStorageKey() {
                    if (!this.data.activeMode) return null;
                    return `spellState_${this.data.activeMode}_${this.data.subMode || 'default'}`;
                },
                saveSpellingState() {
                    const key = this.getStorageKey();
                    if (key && this.data.state) wx.setStorageSync(key, this.data.state);
                    wx.setStorageSync('spellLastActive', { mode: this.data.activeMode, sub: this.data.subMode });
                },
                loadSpellingState() {
                    const lastActive = wx.getStorageSync('spellLastActive');
                    if (lastActive && lastActive.mode) {
                        this.switchMode(lastActive.mode, lastActive.sub, true);
                    }
                },
                updateUINav() {
                    [this.elements.selectBtn, this.elements.reviewBtn, this.elements.errorBtn].forEach(b => b.classList.remove('active'));
                    if (this.data.activeMode === 'select') {
                        this.elements.selectBtn.classList.add('active');
                        this.elements.selectBtn.value = this.data.subMode || "";
                    }
                    if (this.data.activeMode === 'review') {
                        this.elements.reviewBtn.classList.add('active');
                        this.elements.selectBtn.value = "";
                    }
                    if (this.data.activeMode === 'error') {
                        this.elements.errorBtn.classList.add('active');
                        this.elements.selectBtn.value = "";
                    }
                },
                removeWordFromState(wordToDelete) {
                    Object.keys(localStorage).forEach(key => {
                        if (key.startsWith('spellState_')) {
                            let state = wx.getStorageSync(key);
                            if (state) {
                                let modified = false;
                                if (state.queue) {
                                    let len = state.queue.length;
                                    state.queue = state.queue.filter(w => w.word !== wordToDelete);
                                    if (state.queue.length !== len) { modified = true; state.totalM -= (len - state.queue.length); }
                                }
                                if (state.roundErrors) {
                                    state.roundErrors = state.roundErrors.filter(w => w.word !== wordToDelete);
                                    modified = true;
                                }
                                if (state.currentWord && state.currentWord.word === wordToDelete) {
                                    state.currentWord = null; modified = true;
                                }
                                if (modified) {
                                    wx.setStorageSync(key, state);
                                    if (this.getStorageKey() === key && this.data.state) {
                                        this.data.state = state;
                                        if (!state.currentWord) this.nextWord(); else this.updateProgressUI();
                                    }
                                }
                            }
                        }
                    });
                },
                switchMode(mode, subMode, isResume = false) {
                    this.data.activeMode = mode;
                    this.data.subMode = subMode;
                    this.updateUINav();
                    
                    const key = this.getStorageKey();
                    let savedState = wx.getStorageSync(key);
                    
                    if (savedState && savedState.totalM > 0 && (savedState.currentWord || savedState.queue.length > 0 || savedState.roundErrors?.length > 0)) {
                        this.data.state = savedState;
                        if (!this.data.state.roundErrors) this.data.state.roundErrors = [];
                        this.renderCurrentWord();
                    } else if (!isResume) {
                        this.initNewQueue();
                    } else {
                        this.setEmptyState('本模式暂无进度或已完成');
                    }
                },
                restartCurrentMode() {
                    if (!this.data.activeMode) { wx.showToast({title: '请先选择模式', icon:'none'}); return; }
                    this.initNewQueue();
                },
                initNewQueue() {
                    let baseList = [];
                    const allCards = wx.getStorageSync('myCards') || [];
                    
                    if (this.data.activeMode === 'select') {
                        if (this.data.subMode === 'A') baseList = [...allCards];
                        else if (this.data.subMode === '0') baseList = wx.getStorageSync('allword') || [];
                        else if (this.data.subMode === '1') baseList = wx.getStorageSync('todayword') || [];
                        else if (this.data.subMode === '-1') baseList = wx.getStorageSync('todayNewWord') || [];
                        else if (this.data.subMode === 'E') {
                            const errorBook = wx.getStorageSync('errorBook') || [];
                            baseList = errorBook.map(e => allCards.find(c => c.word === e.word)).filter(Boolean);
                        }
                    } else if (this.data.activeMode === 'review') {
                        const reviewToday = wx.getStorageSync('reviewToday') || [];
                        baseList = reviewToday.map(word => allCards.find(c => c.word === word)).filter(Boolean);
                    } else if (this.data.activeMode === 'error') {
                        const errorToday = wx.getStorageSync('errorToday') || [];
                        baseList = errorToday.map(word => allCards.find(c => c.word === word)).filter(Boolean);
                    }

                    if (baseList.length === 0) {
                        this.setEmptyState('当前条件下没有单词'); return;
                    }

                    baseList = baseList.sort(() => Math.random() - 0.5);

                    this.data.state = {
                        queue: baseList.map(c => ({ word: c.word, meaning: c.meaning, failAttempt: 0 })),
                        totalM: baseList.length, currentN: 1, wrongJ: 0,
                        currentWord: null, roundErrors: [], isErrorReviewPhase: false
                    };
                    this.nextWord();
                },
                setEmptyState(msg) {
                    this.data.state = null;
                    this.elements.meaningDisplay.textContent = msg;
                    this.elements.meaningDisplay.classList.remove('meaning-red');
                    this.elements.inputField.value = '';
                    this.elements.inputField.disabled = true;
                    this.elements.progressDisplay.style.display = 'none';
                    this.elements.hintDisplay.style.visibility = 'hidden';
                    this.saveSpellingState();
                },
                nextWord() {
                    if (this.data.state.queue.length === 0) {
                        if (this.data.state.roundErrors && this.data.state.roundErrors.length > 0) {
                            wx.showToast({title: '进入本轮错题复习环节', icon: 'info'});
                            this.data.state.isErrorReviewPhase = true;
                            this.data.state.queue = [...this.data.state.roundErrors].sort(() => Math.random() - 0.5);
                            this.data.state.totalM = this.data.state.queue.length;
                            this.data.state.currentN = 1;
                            this.data.state.wrongJ = 0;
                            this.data.state.roundErrors = []; 
                        } else {
                            this.setEmptyState('太棒了，本次拼写已完美完成！再次点击重来可重刷。');
                            if (this.data.activeMode === 'review') app.globalInit();
                            return;
                        }
                    }
                    this.data.state.currentWord = this.data.state.queue.shift();
                    this.renderCurrentWord();
                },
                renderCurrentWord() {
                    if (!this.data.state || !this.data.state.currentWord) return;
                    
                    this.elements.inputField.disabled = false;
                    this.elements.inputField.value = '';
                    this.elements.hintDisplay.style.visibility = 'hidden';
                    
                    const wordObj = this.data.state.currentWord;
                    
                    this.elements.meaningDisplay.innerHTML = (wordObj.meaning && wordObj.meaning.trim() !== '') 
                        ? wordObj.meaning.replace(new RegExp(NEWLINE_REPLACEMENT, 'g'), '<br>') 
                        : '<span style="color:#aaa; font-size:14px;">该单词无释义，请添加</span>';
                        
                    if (this.data.state.isErrorReviewPhase) this.elements.meaningDisplay.classList.add('meaning-red');
                    else this.elements.meaningDisplay.classList.remove('meaning-red');
                    
                    this.elements.progressDisplay.style.display = 'block';
                    this.updateProgressUI();
                    
                    this.saveSpellingState();
                    setTimeout(() => { this.elements.inputField.focus(); }, 100);
                },
                updateProgressUI() {
                    this.elements.progressNM.textContent = `${this.data.state.currentN}/${this.data.state.totalM}`;
                    this.elements.progressJ.textContent = this.data.state.wrongJ;
                },
                checkInput() {
                    if (!this.data.state || !this.data.state.currentWord) return;
                    const inputStr = this.elements.inputField.value.trim();
                    if (!inputStr) return;

                    const correctWord = this.data.state.currentWord.word;
                    const normalize = (str) => str.replace(/[^a-zA-Z0-9]/g, '').toLowerCase();
                    const isCorrect = normalize(inputStr) === normalize(correctWord);

                    if (isCorrect) this.handleCorrectSpelling(correctWord);
                    else this.handleWrongSpelling(correctWord);
                },
                handleCorrectSpelling(word) {
                    wx.showToast({title: '正确', icon: 'success', duration: 500});
                    this.updateSpellingStats(word, true);

                    if (this.data.activeMode === 'review') {
                        let errorBook = wx.getStorageSync('errorBook') || [];
                        let eItem = errorBook.find(e => e.word === word);
                        if (eItem) {
                            eItem.reviewLevel++;
                            eItem.lastReviewDate = new Date().toLocaleDateString('en-CA');
                            eItem.correctCount = (eItem.correctCount || 0) + 1;
                            wx.setStorageSync('errorBook', errorBook);
                        }
                    }
                    this.elements.hintDisplay.style.visibility = 'hidden';
                    this.data.state.currentN++;
                    this.nextWord();
                },
                handleWrongSpelling(word) {
                    const activeWord = this.data.state.currentWord;
                    activeWord.failAttempt++;
                    this.data.state.wrongJ++;
                    this.updateSpellingStats(word, false);
                    this.updateProgressUI();

                    const todayStr = new Date().toLocaleDateString('en-CA');
                    let errorBook = wx.getStorageSync('errorBook') || [];
                    let eItem = errorBook.find(e => e.word === word);
                    if (eItem) {
                        eItem.reviewLevel = 0; eItem.lastReviewDate = todayStr; eItem.failCount = (eItem.failCount || 0) + 1;
                    } else {
                        errorBook.push({ word: word, joinDate: todayStr, lastReviewDate: todayStr, reviewLevel: 0, failCount: 1, correctCount: 0 });
                    }
                    wx.setStorageSync('errorBook', errorBook);

                    let errorToday = wx.getStorageSync('errorToday') || [];
                    if (!errorToday.includes(word)) {
                        errorToday.push(word); wx.setStorageSync('errorToday', errorToday);
                    }

                    if (activeWord.failAttempt === 1) {
                        this.data.state.roundErrors.push({ word: activeWord.word, meaning: activeWord.meaning, failAttempt: 0 });
                    }

                    if (activeWord.failAttempt > 1) {
                        this.elements.hintDisplay.textContent = word;
                        this.elements.hintDisplay.style.visibility = 'visible';
                        setTimeout(() => { this.elements.hintDisplay.style.visibility = 'hidden'; }, 2000);
                    } else {
                        wx.showToast({title: '拼写错误', icon: 'error', duration: 800});
                    }

                    this.elements.inputField.value = '';
                    this.saveSpellingState();
                },
                updateSpellingStats(word, isCorrect) {
                    let stats = wx.getStorageSync('spellingStats') || {};
                    if (!stats[word]) stats[word] = { correct: 0, wrong: 0 };
                    if (isCorrect) stats[word].correct++; else stats[word].wrong++;
                    wx.setStorageSync('spellingStats', stats);
                },
                travelWord() {
                    if (!this.data.state || !this.data.state.currentWord) return;
                    const word = this.data.state.currentWord.word;
                    wx.setClipboardData({ data: word }); 
                    window.location.href = `eudic://dict/${encodeURIComponent(word.trim())}`;
                },
                copyEmptyMeaningWords() {
                    const allCards = wx.getStorageSync('myCards') || [];
                    const emptyWords = allCards
                        .filter(card => !card.meaning || card.meaning.trim() === '')
                        .map(card => card.word.replace(new RegExp(NEWLINE_REPLACEMENT, 'g'), '\n'));
                        
                    if (emptyWords.length === 0) { wx.showToast({ title: '太棒了，没有空释义单词！', icon: 'info' }); return; }
                    wx.setClipboardData({ data: emptyWords.join('\n'), success: () => wx.showToast({ title: `成功复制 ${emptyWords.length} 个单词`, icon: 'success', duration: 1500 }) });
                }
            },

                    let words = wx.getStorageSync('markedWords') || [];
                    this.elements.container.innerHTML = ''; this.data.selectedWord = null; this.elements.actionContainer.style.display = 'none';
                    if (words.length === 0) { this.elements.noMarkedMsg.style.display = 'block'; }
                    else {
                        this.elements.noMarkedMsg.style.display = 'none';
                        words.forEach(word => {
                            const wordEl = document.createElement('div'); wordEl.className = 'marked-word'; 
                            wordEl.innerHTML = word.replace(new RegExp(NEWLINE_REPLACEMENT, 'g'), '<br>'); 
                            wordEl.dataset.word = word; 
                            wordEl.addEventListener('click', (e) => this.selectWord(e)); 
                            this.elements.container.appendChild(wordEl);
                        });
                    }
                },
                selectWord(e) {
                    const word = e.currentTarget.dataset.word; 
                    if (this.data.selectedWord === word) {
                        this.data.selectedWord = null; e.currentTarget.classList.remove('selected'); this.elements.actionContainer.style.display = 'none';
                    } else {
                        if (this.data.selectedWord) { const prevSelected = this.elements.container.querySelector('.selected'); if (prevSelected) prevSelected.classList.remove('selected'); }
                        this.data.selectedWord = word; e.currentTarget.classList.add('selected'); this.elements.actionContainer.style.display = 'flex';
                    }
                },
                deleteSelectedWord() {
                    if (!this.data.selectedWord) return;
                    let markedWords = wx.getStorageSync('markedWords') || []; 
                    markedWords = markedWords.filter(w => w !== this.data.selectedWord); 
                    wx.setStorageSync('markedWords', markedWords); wx.showToast({ title: '删除成功', icon: 'success', duration: 400 }); this.loadMarkedWords();
                },
                travelSelectedWord() {
                    if (!this.data.selectedWord) return;
                    const actualWord = this.data.selectedWord.replace(new RegExp(NEWLINE_REPLACEMENT, 'g'), '\n');
                    wx.setClipboardData({ data: actualWord }); window.location.href = `eudic://dict/${encodeURIComponent(actualWord.trim())}`;
                }
            },

            // =================================== PAGE 5: 展馆 ===================================
            page5: {
                data: { selectedWord: null },
                elements: {
                    container: document.getElementById('galleryWordsContainer'), noMsg: document.getElementById('noGalleryMessage'),
                    actionContainer: document.getElementById('page5ActionContainer'), deleteBtn: document.getElementById('deleteGalleryBtn'), clearBtn: document.getElementById('clearGalleryBtn'), travelBtn: document.getElementById('travelGalleryBtn')
                },
                onLoad() { this.addEventListeners(); },
                onShow() { this.loadGalleryWords(); },
                addEventListeners() {
                    this.elements.deleteBtn.addEventListener('click', () => this.deleteSelectedWord());
                    this.elements.clearBtn.addEventListener('click', () => this.clearAll());
                    this.elements.travelBtn.addEventListener('click', () => this.travelSelectedWord());
                },
                loadGalleryWords() {
                    let errorBook = wx.getStorageSync('errorBook') || [];
                    this.elements.container.innerHTML = ''; this.data.selectedWord = null; this.elements.actionContainer.style.display = 'none';
                    if (errorBook.length === 0) { this.elements.noMsg.style.display = 'block'; }
                    else {
                        this.elements.noMsg.style.display = 'none';
                        errorBook.forEach(item => {
                            const wordEl = document.createElement('div'); wordEl.className = 'gallery-word'; 
                            wordEl.innerHTML = item.word.replace(new RegExp(NEWLINE_REPLACEMENT, 'g'), '<br>'); 
                            wordEl.dataset.word = item.word; 
                            wordEl.addEventListener('click', (e) => this.selectWord(e)); 
                            this.elements.container.appendChild(wordEl);
                        });
                    }
                },
                selectWord(e) {
                    const word = e.currentTarget.dataset.word; 
                    if (this.data.selectedWord === word) {
                        this.data.selectedWord = null; e.currentTarget.classList.remove('selected'); this.elements.actionContainer.style.display = 'none';
                    } else {
                        if (this.data.selectedWord) { const prevSelected = this.elements.container.querySelector('.selected'); if (prevSelected) prevSelected.classList.remove('selected'); }
                        this.data.selectedWord = word; e.currentTarget.classList.add('selected'); this.elements.actionContainer.style.display = 'flex';
                    }
                },
                deleteSelectedWord() {
                    if (!this.data.selectedWord) return;
                    let errorBook = wx.getStorageSync('errorBook') || []; 
                    errorBook = errorBook.filter(w => w.word !== this.data.selectedWord); 
                    wx.setStorageSync('errorBook', errorBook); wx.showToast({ title: '删除成功', icon: 'success', duration: 400 }); this.loadGalleryWords();
                },
                clearAll() {
                    wx.showModal({
                        title: '清空确认',
                        content: '确认清空整个错题本吗？',
                        success: (res) => {
                            if (res.confirm) {
                                wx.setStorageSync('errorBook', []);
                                wx.showToast({title: '已清空', icon: 'success'});
                                this.loadGalleryWords();
                            }
                        }
                    });
                },
                travelSelectedWord() {
                    if (!this.data.selectedWord) return;
                    const actualWord = this.data.selectedWord.replace(new RegExp(NEWLINE_REPLACEMENT, 'g'), '\n');
                    wx.setClipboardData({ data: actualWord }); window.location.href = `eudic://dict/${encodeURIComponent(actualWord.trim())}`;
                }
            }
        };

        // --- Initialize App ---
        Object.values(app).forEach(pageModule => { if(typeof pageModule.onLoad === 'function') pageModule.onLoad(); });
        app.globalInit();
        navigateTo('page1');
    });
    </script>
    <script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => { navigator.serviceWorker.register('./service-worker.js').catch(()=>{}); });
    }
    </script>
</body>
